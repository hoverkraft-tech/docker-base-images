---
version: 2
updates:
  - package-ecosystem: docker
    open-pull-requests-limit: 20
    directory: "/"
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    cooldown:
      default-days: 7
    groups:
      docker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: docker
    open-pull-requests-limit: 20
    directories:
      - "/images/*/*"
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    open-pull-requests-limit: 20
    directory: "/images/testcontainers-node"
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    cooldown:
      default-days: 7
    groups:
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    open-pull-requests-limit: 20
    directories:
      - "/"
      - "/actions/**/*"
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    cooldown:
      default-days: 7
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    open-pull-requests-limit: 20
    directory: "/"
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    cooldown:
      default-days: 7
