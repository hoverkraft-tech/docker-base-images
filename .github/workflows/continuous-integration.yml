# Continuous Integration for Docker images
# ========================================
# Workflow to perform CI tasks:
# - Linting
# - Build images
# - Update Pull Request with built images
# - Delete built images once Pull Request is merged

name: Continuous Integration for Docker images

on:
  workflow_call:
    inputs:
      oci-registry:
        description: "OCI registry where to pull and push images. See [https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md](https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md)"
        type: string
        default: "ghcr.io"
        required: false
      oci-registry-username:
        description: "Username used to log against the OCI registry. See [https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md](https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md)"
        type: string
        default: ${{ github.repository_owner }}
        required: false
      platforms:
        description: "Platforms to build images for"
        required: false
        type: string
        default: '["linux/amd64","linux/arm64","linux/arm/v7"]'
    secrets:
      oci-registry-password:
        description: "Password or GitHub token (packages:read and packages:write scopes) used to log against the OCI registry. See [https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md](https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md)"
        required: true
    outputs:
      built-images:
        description: 'Built images names and tags. See [https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md](https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md)'
        value: ${{ jobs.build-images.outputs.built-images }}

jobs:
  checks:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/linter.yml@0.7.2

  get-available-images:
    needs: checks
    uses: ./.github/workflows/get-available-images.yml

  prepare-images-to-build:
    needs: get-available-images
    runs-on: "ubuntu-latest"
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-available-images.outputs.images) }}
    outputs:
      images: ${{ steps.set-images-to-build.outputs.images }}
    permissions:
      contents: read
      # FIXME: This is a workaround for having workflow actions. See https://github.com/orgs/community/discussions/38659
      id-token: write
    steps:
      # FIXME: This is a workaround for having workflow actions. See https://github.com/orgs/community/discussions/38659
      - id: oidc
        uses: ChristopherHX/oidc@v2
      - uses: actions/checkout@v3
        with:
          path: ./self-workflow
          repository: ${{ steps.oidc.outputs.job_workflow_repo_name_and_owner }}
          ref: ${{ steps.oidc.outputs.job_workflow_repo_ref }}
      
      - id: set-images-to-build
        if: steps.should-build-image.outputs.should-build-image == 'true'
        run: |
          BUILD_IMAGES='{"name":"${{ matrix.image }}","context": "images/${{ matrix.image }}", "dockerfile": "Dockerfile", "platforms": ${{ inputs.platforms }} }'
          echo "images<<EOF" >> "$GITHUB_OUTPUT" && echo "$BUILD_IMAGES" >> "$GITHUB_OUTPUT" && echo "EOF" >> "$GITHUB_OUTPUT"

      # FIXME: Set built images infos in file to be uploaded as artifacts, because github action does not handle job outputs for matrix
      # https://github.com/orgs/community/discussions/26639
      - uses: hoverkraft-tech/ci-github-common/actions/set-matrix-output@0.7.2
        with:
          value: ${{ steps.set-images-to-build.outputs.images }}
          artifact-name: images-to-build

  # FIXME: Download matrix ouputs from artifacts, because github action does not handle job outputs for matrix
  # https://github.com/orgs/community/discussions/26639
  get-images-to-build:
    needs: prepare-images-to-build
    runs-on: "ubuntu-latest"
    outputs:
      images: ${{ steps.get-outputs.outputs.result }}
    steps:
      - id: get-outputs
        uses: hoverkraft-tech/ci-github-common/actions/get-matrix-outputs@0.7.2
        with:
          artifact-name: "images-to-build"

  build-images:
    # FIXME: This is a workaround for having workflow actions. See https://github.com/orgs/community/discussions/38659
    permissions:
      id-token: write
      contents: read
      packages: write
      issues: read
      pull-requests: read
    needs: get-images-to-build
    if: needs.get-images-to-build.outputs.images != '[]'
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@0.9.2
    with:      
      oci-registry: ${{ inputs.oci-registry }}
      oci-registry-username: ${{ inputs.oci-registry-username }}
      images: ${{ needs.get-images-to-build.outputs.images }}
    secrets:
      oci-registry-password: ${{ secrets.oci-registry-password }}

  update-pr:
    if: ${{ needs.build-images.outputs.built-images }} && github.event_name == 'pull_request'
    name: Update Pull Request
    runs-on: "ubuntu-latest"
    needs: build-images
    permissions:
      pull-requests: write
      issues: write
    steps:
      - id: get-comment-built-images
        uses: actions/github-script@v6.4.1
        with:
          script: |
            const builtImagesOutput = `${{ needs.build-images.outputs.built-images }}`;
            try {
              builtImages = JSON.parse(builtImagesOutput);
            } catch (error) {
              throw new Error(`"built-images" output is not a valid JSON: ${error}`);
            }

            if (typeof builtImages !== 'object') {
                core.setFailed('Given "built-images" output is not an object.');
                return;
            }

            const commentMessage = Object.values(builtImages).map(({name,images}) => {
                const imagesToPull = images.map(image => `\`\`\`\ndocker pull ${image}\n\`\`\``).join("\n");
                
                return `### ${name}\n${imagesToPull}`;
            }).join("\n");

            if(commentMessage.length){
              core.setOutput(
                'comment-body', 
                commentMessage + "\n\nOnce the Pull Request gets validated, these(s) image(s) will automatically be deleted."
              );
            } else {
              core.setOutput('comment-body','No images have been built.');
            }

      - uses: hoverkraft-tech/ci-github-common/actions/create-or-update-comment@0.7.2
        with:
          title: "Images have been built :sparkles: !"
          body: |
            ${{ steps.get-comment-built-images.outputs.comment-body }}
          reactions: "rocket"
    
