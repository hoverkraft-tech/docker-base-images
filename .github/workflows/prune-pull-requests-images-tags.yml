# Reusable workflow to clean up transient image tags created for pull requests and tag-push CI
# Gets the available images from the "images" folder dynamically.
# Cleanup is performed using the hoverkraft-tech/ci-github-container action.
# Should be used from main CI workflow after tests are done.
---
name: Clean transient image tags

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      runs-on:
        description: |
          JSON array of runner(s) to use.
          See https://docs.github.com/en/actions/using-jobs/choosing-the-runner-for-a-job.
        type: string
        default: '["ubuntu-latest"]'
        required: false

permissions: {}

jobs:
  get-available-images-matrix:
    uses: ./.github/workflows/__get-available-images-matrix.yml
    with:
      runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read

  prune-pull-request-tags:
    permissions:
      contents: read
      packages: write
      pull-requests: read
    needs: get-available-images-matrix
    uses: hoverkraft-tech/ci-github-container/.github/workflows/prune-pull-requests-images-tags.yml@5396e1258d209f9af18e55da8692361508e3338c # 0.36.2
    with:
      runs-on: ${{ inputs.runs-on }}
      images: ${{ needs.get-available-images-matrix.outputs.images-matrix }}

  prune-ci-tags:
    name: Prune CI image tags
    needs: get-available-images-matrix
    runs-on: ${{ fromJson(inputs.runs-on) }}
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.get-available-images-matrix.outputs.images-matrix) }}
    steps:
      - uses: hoverkraft-tech/ci-github-container/actions/docker/clean-images@5396e1258d209f9af18e55da8692361508e3338c # 0.36.2
        with:
          package: ${{ github.repository }}/${{ matrix.image }}
          tags: prune-ci-*
          github-token: ${{ github.token }}
