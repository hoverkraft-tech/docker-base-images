---
name: Build Docker images

on: # yamllint disable-line rule:truthy
  workflow_call:
    inputs:
      runs-on:
        description: |
          JSON array of runner(s) to use.
          See https://docs.github.com/en/actions/using-jobs/choosing-the-runner-for-a-job.
        type: string
        default: '["ubuntu-latest"]'
        required: false
      oci-registry:
        description: "OCI registry where to pull and push images."
        type: string
        default: "ghcr.io"
        required: false
      oci-registry-username:
        description: |
          Username used to log against the OCI registry.
          See https://github.com/docker/login-action#usage.
        type: string
        default: ${{ github.repository_owner }}
        required: false
      platforms:
        description: |
          JSON array of platforms to build images for by default.
          Can be overridden per image with `images/<image>/build.json` or an image object in `images`.
          See https://docs.docker.com/buildx/working-with-buildx/#build-multi-platform-images.
        type: string
        default: '["linux/amd64","linux/arm64"]'
        required: false
      images:
        description: |
          JSON array of image names or image objects to build.
          Each entry can be either a string image name or an object.
          Supported object fields here are:
            - `name`: (required) the image name, corresponding to the folder in `images/` containing the Dockerfile.
            - `tag`: (optional) explicit tag to use for the built image. If not provided, the default tagging strategy will be applied (usually `latest` and the Git SHA).
            - `platforms`: (optional) array of platforms overriding the default platforms.
          Additional object fields are passed through to the downstream Docker build workflow.
          Examples:
            - `["php-8", "nodejs-24"]`
            - `[{"name":"ci-helm"}]`
            - `[{"name":"ci-helm","tag":"prune-ci-<sha>","platforms":["linux/amd64"]}]`
        type: string
        required: true
    outputs:
      built-images:
        description: |
          Built images data.
          See https://github.com/hoverkraft-tech/ci-github-container/blob/main/.github/workflows/docker-build-images.md#outputs.
        value: ${{ jobs.build-images.outputs.built-images }}
    secrets:
      oci-registry-password:
        description: |
          Password or GitHub token (packages:read and packages:write scopes) used to log against the OCI registry.
          Defaults to GITHUB_TOKEN if not provided.
        required: false

permissions: {}

jobs:
  prepare-images-to-build:
    runs-on: ${{ fromJson(inputs.runs-on) }}
    permissions:
      contents: read
    outputs:
      images: ${{ steps.set-images-to-build.outputs.images }}
    steps:
      - id: set-images-to-build
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          IMAGES: ${{ inputs.images }}
          PLATFORMS: ${{ inputs.platforms }}
        with:
          github-token: ${{ github.token }}
          script: |
            const imageBuildConfigFile = 'build.json';

            function isNonEmptyString(value) {
              return typeof value === 'string' && value.length > 0;
            }

            function ensurePlatforms(platforms, source) {
              if (!Array.isArray(platforms) || platforms.some((platform) => !isNonEmptyString(platform))) {
                throw new Error(`${source} must be a JSON array of non-empty platform strings.`);
              }

              return [...platforms];
            }

            async function getImageBuildConfig(imageName) {
              const configPath = `images/${imageName}/${imageBuildConfigFile}`;

              try {
                const { data } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: configPath,
                  ref: context.sha,
                });

                if (Array.isArray(data) || data.type !== 'file' || !data.content) {
                  throw new Error(`Image '${imageName}' build config at '${configPath}' must be a file.`);
                }

                const config = JSON.parse(Buffer.from(data.content, data.encoding || 'base64').toString('utf8'));

                if (!config || typeof config !== 'object' || Array.isArray(config)) {
                  throw new Error(`Image '${imageName}' build config must be a JSON object.`);
                }

                if (config.platforms !== undefined) {
                  config.platforms = ensurePlatforms(config.platforms, `Image '${imageName}' build config 'platforms'`);
                }

                return config;
              } catch (error) {
                if (error.status === 404) {
                  return {};
                }

                throw error;
              }
            }

            const images = JSON.parse(process.env.IMAGES);
            if (!Array.isArray(images)) {
              throw new Error("Input 'images' is not a valid JSON array.");
            }

            if (images.length === 0) {
              core.info("No images to build.");
              return;
            }

            const platforms = ensurePlatforms(JSON.parse(process.env.PLATFORMS), "Input 'platforms'");
            const imagesToBuild = [];
            for (const imageEntry of images) {
              const image = typeof imageEntry === 'string' ? { name: imageEntry } : imageEntry;

              if (!image || typeof image !== 'object' || Array.isArray(image) || !isNonEmptyString(image.name)) {
                throw new Error("Image entry is not valid. It should be either a string or an object with a 'name' property.");
              }

              if (image.tag !== '' && image.tag !== undefined && !isNonEmptyString(image.tag)) {
                throw new Error(`Image '${image.name}' tag must be a non-empty string when provided.`);
              }

              const buildConfig = await getImageBuildConfig(image.name);
              const imagePlatforms = image.platforms === undefined
                ? buildConfig.platforms || platforms
                : ensurePlatforms(image.platforms, `Image '${image.name}' input 'platforms'`);

              const imageToBuild = {
                context: `images/${image.name}`,
                dockerfile: 'Dockerfile',
                ...image,
                platforms: imagePlatforms,
              };

              imagesToBuild.push(imageToBuild);
            }
            core.setOutput('images', JSON.stringify(imagesToBuild));

  build-images:
    needs: prepare-images-to-build
    if: needs.prepare-images-to-build.outputs.images
    uses: hoverkraft-tech/ci-github-container/.github/workflows/docker-build-images.yml@5396e1258d209f9af18e55da8692361508e3338c # 0.36.2
    permissions:
      contents: read
      issues: read
      packages: write
      pull-requests: read
      id-token: write
    with:
      oci-registry-username: ${{ inputs.oci-registry-username }}
      oci-registry: ${{ inputs.oci-registry }}
      images: ${{ needs.prepare-images-to-build.outputs.images }}
    secrets:
      oci-registry-password: ${{ secrets.oci-registry-password || secrets.GITHUB_TOKEN || github.token }}

  summary:
    name: Built Images
    if: needs.build-images.outputs.built-images
    runs-on: ${{ fromJson(inputs.runs-on) }}
    needs: build-images
    permissions:
      contents: read
      pull-requests: write
    steps:
      - id: generate-summary
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUILT_IMAGES: ${{ needs.build-images.outputs.built-images }}
        with:
          script: |
            const builtImages = JSON.parse(process.env.BUILT_IMAGES || '{}');
            const imageNames = Object.keys(builtImages);

            if (imageNames.length === 0) {
              core.setOutput('summary', '');
              return;
            }

            const headers = ['Image', 'Tags', 'Platforms', 'Digest'];
            const tableRows = [];

            for (const imageName of imageNames) {
              const imageData = builtImages[imageName];
              const tags = imageData.tags ? imageData.tags.join(', ') : '-';
              const platforms = imageData.platforms ? imageData.platforms.join(', ') : '-';
              const digest = imageData.digest ? `${imageData.digest.substring(0, 20)}...` : '-';
              const fullImage = (imageData.registry && imageData.repository)
                ? `${imageData.registry}/${imageData.repository}`
                : imageName;

              tableRows.push([fullImage, tags, platforms, digest]);
            }

            await core.summary.clear();

            core.summary
              .addTable([
                headers.map((header) => ({ data: header, header: true })),
                ...tableRows.map((row) => row.map((cell) => ({ data: cell }))),
              ])
              .addHeading('Image Details', 3);

            for (const imageName of imageNames) {
              const imageData = builtImages[imageName];
              let detailMarkup = '';
              if (imageData.images && imageData.images.length > 0) {
                const primaryImage = imageData.images[0];
                const pullCommand = `docker pull ${primaryImage}`;

                detailMarkup += '<p><strong>Pull command:</strong></p>\n';
                detailMarkup += '<pre><code>\n';
                detailMarkup += `${pullCommand}\n`;
                detailMarkup += '</code></pre>\n';

                detailMarkup += '<p><strong>Full image references:</strong></p>\n<ul>\n';
                for (const image of imageData.images) {
                  detailMarkup += `<li><code>${image}</code></li>\n`;
                }
                detailMarkup += '</ul>\n';
              }

              if (imageData.annotations) {
                const annotationsMarkup = Object.entries(imageData.annotations)
                  .map(([key, value]) => `<li><code>${key}</code>: ${value}</li>`)
                  .join('\n');

                detailMarkup += '<p><strong>Annotations:</strong></p>\n';
                detailMarkup += `<ul>\n${annotationsMarkup}\n</ul>`;
              }

              const detailsBody = detailMarkup || '<em>No additional details.</em>';
              core.summary.addDetails(imageName, detailsBody);
            }

            const summaryTitle = 'Built Images Summary';
            core.setOutput('summary-title', summaryTitle);

            const summaryContent = await core.summary.stringify();
            core.setOutput('summary-body', summaryContent);

            await core.summary.clear();
            core.summary.addHeading(summaryTitle, 2).addRaw(summaryContent);
            await core.summary.write();

      - uses: hoverkraft-tech/ci-github-common/actions/create-or-update-comment@66578f5b9aec4ac5558b5dad750c4c74dfcb65c5 # 0.35.5
        if: github.event.pull_request.number && steps.generate-summary.outputs.summary-body
        with:
          title: "## ${{ steps.generate-summary.outputs.summary-title }}"
          body: ${{ steps.generate-summary.outputs.summary-body }}
