---
name: Internal - Common Continuous Integration tasks

on: # yamllint disable-line rule:truthy
  workflow_call:

permissions: {}

jobs:
  prepare-build-test-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      images: ${{ steps.set-images.outputs.images }}
    env:
      TEST_IMAGE_NAME: testcontainers-node
    steps:
      - id: local-workflow-actions
        uses: hoverkraft-tech/ci-github-common/actions/local-workflow-actions@66578f5b9aec4ac5558b5dad750c4c74dfcb65c5 # 0.35.5
        with:
          actions-path: actions

      - id: should-build-images
        uses: ./../self-workflow/actions/should-build-images
        with:
          images: ${{ format('["{0}"]', env.TEST_IMAGE_NAME) }}

      - id: set-images
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SHOULD_BUILD_IMAGES: ${{ steps.should-build-images.outputs.should-build-images }}
        with:
          script: |
            const shouldBuildImages = JSON.parse(process.env.SHOULD_BUILD_IMAGES);

            const imagesToBuild = Object.entries(shouldBuildImages)
              .filter(([image, shouldBuild]) => shouldBuild === true)
              .map(([image, shouldBuild]) => image);

            core.setOutput('images', JSON.stringify(imagesToBuild));

  build-test-image:
    needs: prepare-build-test-image
    uses: ./.github/workflows/__docker-build-images.yml
    permissions:
      contents: read
      id-token: write
      issues: read
      packages: write
      pull-requests: write
    with:
      images: ${{ needs.prepare-build-test-image.outputs.images }}
    secrets:
      oci-registry-password: ${{ github.token }}

  prepare-test-image:
    needs: build-test-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      test-image-tag: ${{ steps.set-test-image-tag.outputs.test-image-tag }}
    steps:
      - id: set-test-image-tag
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          BUILT_IMAGES: ${{ needs.build-test-image.outputs.built-images }}
        with:
          script: |
            const testImageName = process.env.TEST_IMAGE_NAME;
            const builtImages = JSON.parse(process.env.BUILT_IMAGES || '{}');

            const testImageData = builtImages[testImageName];
            if (!testImageData) {
              return;
            }

            const testImageTag = testImageData.tags?.[0];

            if (!testImageTag) {
              throw new Error(
                `No built ${testImageName} image tag found. Available built images: ${Object.keys(builtImages).join(", ")}.`
              );
            }

            core.setOutput("test-image-tag", testImageTag);

  ci:
    needs: prepare-test-image
    uses: ./.github/workflows/continuous-integration.yml
    permissions:
      actions: read
      contents: read
      id-token: write
      issues: write
      packages: write
      pull-requests: write
      security-events: write
      statuses: write
    with:
      test-image-tag: ${{ needs.prepare-test-image.outputs.test-image-tag || null }}
    secrets:
      oci-registry-password: ${{ github.token }}
